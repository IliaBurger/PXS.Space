<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PXS // Cosmic 3D Stock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Шапка -->
  <header>
    <div class="logo">PXS.SPACE</div>
    <nav>
      <a href="index.html" class="active">Обзор</a>
      <a href="admin.html">Админка</a>
      <a href="upload.html">Загрузить модель</a>
    </nav>
  </header>

  <!-- Главный экран (Поиск + Рекомендация) -->
  <section class="hero-section">
    <div class="hero-content">
      <h1>Лучшие бесплатные 3D-модели от космического сообщества.</h1>
      <p>Открытая библиотека цифровых активов, кораблей и объектов для ваших миров.</p>
      
      <!-- Поиск в стиле Pexels -->
      <div class="search-bar">
        <select id="searchCategory">
          <option value="all">Модели</option>
          <option value="sci-fi">Sci-Fi</option>
          <option value="architecture">Architecture</option>
          <option value="characters">Characters</option>
          <option value="vehicles">Vehicles</option>
        </select>
        <input type="text" id="searchInput" placeholder="Поиск 3D моделей...">
      </div>
    </div>

    <!-- Рекомендация недели -->
    <div class="recommendation-card">
      <div class="rec-image">
        <!-- Графический элемент -->
      </div>
      <div class="rec-info">
        <div class="rec-tag">Рекомендация недели</div>
        <div class="rec-title">Космические станции</div>
      </div>
    </div>
  </section>

  <!-- Фильтры категорий -->
  <div class="categories-container">
    <button class="category-btn active" data-filter="all">Все модели</button>
    <button class="category-btn" data-filter="Sci-Fi">Sci-Fi</button>
    <button class="category-btn" data-filter="Architecture">Architecture</button>
    <button class="category-btn" data-filter="Characters">Characters</button>
    <button class="category-btn" data-filter="Vehicles">Vehicles</button>
  </div>

  <!-- Сетка моделей -->
  <main class="models-grid" id="modelsGrid">
    <!-- Сюда динамически подгружаются модели из базы данных -->
  </main>

  <script src="script.js"></script>
</body>
</html>
