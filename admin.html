<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">PXS // Панель управления</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Шапка -->
  <header>
    <div class="logo">PXS.SPACE // ADMIN</div>
    <nav style="display: flex; align-items: center;">
      <a href="index.html" id="navHome">На главную</a>
      <!-- Переключатель языков -->
      <select id="langSwitcher" style="margin-left: 20px; background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 6px; cursor: pointer;">
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </nav>
  </header>

  <!-- Основной контент админки -->
  <main style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    
    <!-- Форма входа -->
    <div id="loginSection" class="model-card" style="padding: 30px;">
      <h2 id="loginTitle" style="margin-bottom: 20px; font-size: 24px;">Вход в панель</h2>
      <form id="loginForm" style="display: flex; gap: 12px; flex-direction: column;">
        <input type="text" id="adminUser" placeholder="Логин (admin)" required style="padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 8px;">
        <input type="password" id="adminPass" placeholder="Пароль" required style="padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 8px;">
        <button type="submit" id="loginBtn" style="padding: 12px; background: var(--accent-gradient); border: none; color: #fff; font-weight: 600; border-radius: 8px; cursor: pointer;">Войти</button>
      </form>
    </div>

    <!-- Панель добавления моделей (скрыта до входа) -->
    <div id="adminPanel" style="display: none;">
      <h2 id="panelTitle" style="margin-bottom: 20px; font-size: 24px;">Добавить новую 3D-модель</h2>
      
      <form id="addModelForm" class="model-card" style="padding: 30px; display: flex; gap: 16px; flex-direction: column;">
        <div>
          <label id="labelTitle" style="display: block; margin-bottom: 6px; color: var(--text-secondary);">Название модели</label>
          <input type="text" id="modelTitle" required style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 8px;">
        </div>

        <div>
          <label id="labelCategory" style="display: block; margin-bottom: 6px; color: var(--text-secondary);">Категория</label>
          <select id="modelCategory" style="width: 100%; padding: 12px; background: #0b0f19; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; cursor: pointer;">
            <option value="Furniture">Furniture (Мебель)</option>
            <option value="Nature & Plants">Nature & Plants (Природа и растения)</option>
            <option value="Architecture & Interior">Architecture & Interior (Архитектура и интерьер)</option>
            <option value="Characters & Creatures">Characters & Creatures (Персонажи и существа)</option>
            <option value="Vehicles & Tech">Vehicles & Tech (Транспорт и техника)</option>
            <option value="Electronics & Gadgets">Electronics & Gadgets (Электроника и гаджеты)</option>
            <option value="Clothing & Fashion">Clothing & Fashion (Одежда и мода)</option>
            <option value="Food & Drinks">Food & Drinks (Еда и напитки)</option>
            <option value="Tools & Equipment">Tools & Equipment (Инструменты и оборудование)</option>
            <option value="Abstract & Decor">Abstract & Decor (Абстракция и декор)</option>
          </select>
        </div>

        <div>
          <label id="labelAuthor" style="display: block; margin-bottom: 6px; color: var(--text-secondary);">Автор</label>
          <input type="text" id="modelAuthor" placeholder="Имя автора" required style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 8px;">
        </div>

        <div>
          <label id="labelFile" style="display: block; margin-bottom: 6px; color: var(--text-secondary);">Файл 3D модели (.obj, .fbx, .gltf, .glb)</label>
          <input type="file" id="modelFile" accept=".obj,.fbx,.gltf,.glb,.zip" required style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 8px; cursor: pointer;">
        </div>

        <button type="submit" id="submitBtn" style="padding: 12px; background: var(--accent-gradient); border: none; color: #fff; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 10px;">Опубликовать модель</button>
      </form>
    </div>

  </main>

  <script>
    const adminTranslations = {
      ru: {
        pageTitle: "PXS // Панель управления",
        navHome: "На главную",
        loginTitle: "Вход в панель",
        userPlaceholder: "Логин (admin)",
        passPlaceholder: "Пароль",
        loginBtn: "Войти",
        panelTitle: "Добавить новую 3D-модель",
        labelTitle: "Название модели",
        labelCategory: "Категория",
        labelAuthor: "Автор",
        labelFile: "Файл 3D модели (.obj, .fbx, .gltf, .glb)",
        submitBtn: "Опубликовать модель",
        successMsg: "Модель успешно добавлена!",
        errorLogin: "Неверный логин или пароль"
      },
      en: {
        pageTitle: "PXS // Admin Panel",
        navHome: "Home",
        loginTitle: "Admin Login",
        userPlaceholder: "Username (admin)",
        passPlaceholder: "Password",
        loginBtn: "Login",
        panelTitle: "Add New 3D Model",
        labelTitle: "Model Title",
        labelCategory: "Category",
        labelAuthor: "Author",
        labelFile: "3D Model File (.obj, .fbx, .gltf, .glb)",
        submitBtn: "Publish Model",
        successMsg: "Model successfully added!",
        errorLogin: "Invalid username or password"
      }
    };

    const langSwitcher = document.getElementById('langSwitcher');

    function setAdminLanguage(lang) {
      const t = adminTranslations[lang];
      document.getElementById('pageTitle').innerText = t.pageTitle;
      document.getElementById('navHome').innerText = t.navHome;
      document.getElementById('loginTitle').innerText = t.loginTitle;
      document.getElementById('adminUser').placeholder = t.userPlaceholder;
      document.getElementById('adminPass').placeholder = t.passPlaceholder;
      document.getElementById('loginBtn').innerText = t.loginBtn;
      document.getElementById('panelTitle').innerText = t.panelTitle;
      document.getElementById('labelTitle').innerText = t.labelTitle;
      document.getElementById('labelCategory').innerText = t.labelCategory;
      document.getElementById('labelAuthor').innerText = t.labelAuthor;
      document.getElementById('labelFile').innerText = t.labelFile;
      document.getElementById('submitBtn').innerText = t.submitBtn;
      localStorage.setItem('pxs_lang', lang);
    }

    langSwitcher.addEventListener('change', (e) => {
      setAdminLanguage(e.target.value);
    });

    const savedLang = localStorage.getItem('pxs_lang') || 'ru';
    langSwitcher.value = savedLang;
    setAdminLanguage(savedLang);

    const loginForm = document.getElementById('loginForm');
    const loginSection = document.getElementById('loginSection');
    const adminPanel = document.getElementById('adminPanel');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;

      if (user === 'admin' && pass === 'admin') {
        loginSection.style.display = 'none';
        adminPanel.style.display = 'block';
      } else {
        alert(adminTranslations[localStorage.getItem('pxs_lang') || 'ru'].errorLogin);
      }
    });

    const addModelForm = document.getElementById('addModelForm');
    addModelForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('title', document.getElementById('modelTitle').value);
      formData.append('category', document.getElementById('modelCategory').value);
      formData.append('author', document.getElementById('modelAuthor').value);
      formData.append('price', 0);
      
      const fileInput = document.getElementById('modelFile');
      if (fileInput.files.length > 0) {
        formData.append('modelFile', fileInput.files[0]);
      }

      const currentLang = localStorage.getItem('pxs_lang') || 'ru';

      try {
        const response = await fetch('/api/assets', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          alert(adminTranslations[currentLang].successMsg);
          addModelForm.reset();
        } else {
          alert('Error / Ошибка');
        }
      } catch (err) {
        console.error(err);
        alert('Error / Ошибка соединения');
      }
    });
  </script>
</body>
</html>
