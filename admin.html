<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PXS // Панель управления</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="pexels-header">
        <div class="logo-wrapper">
            <span class="logo-text">PXS.SPACE // ADMIN</span>
        </div>
        <nav class="header-nav">
            <a href="index.html">На главную</a>
        </nav>
    </header>

    <div class="container">
        <!-- Блок авторизации -->
        <div class="card" id="loginCard">
            <h2>Вход в панель</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Логин (admin)" required>
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
        </div>

        <!-- Блок загрузки контента -->
        <div class="card" id="uploadCard" style="display: none; max-width: 600px;">
            <h2>Загрузка новой 3D-модели</h2>
            <form id="uploadForm">
                <label style="font-size: 13px; color: var(--text-muted);">Название модели</label>
                <input type="text" name="title" required placeholder="Например: Sci-Fi Drone">
                
                <label style="font-size: 13px; color: var(--text-muted);">Категория</label>
                <select name="category" style="width:100%; padding: 12px 16px; background: rgba(3, 7, 18, 0.6); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-main); margin-bottom: 15px;">
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Architecture">Architecture</option>
                    <option value="Characters">Characters</option>
                    <option value="Vehicles">Vehicles</option>
                </select>

                <label style="font-size: 13px; color: var(--text-muted);">Описание</label>
                <textarea name="description" placeholder="Краткое описание активов..." rows="3"></textarea>

                <label style="font-size: 13px; color: var(--text-muted); display:block; margin-top:5px;">Файл модели (.glb)</label>
                <input type="file" name="file" accept=".glb,.gltf" required style="color:var(--text-main); margin-bottom:15px;">

                <label style="font-size: 13px; color: var(--text-muted); display:block; margin-top:5px;">Картинка-превью (обложка)</label>
                <input type="file" name="preview" accept="image/*" style="color:var(--text-main); margin-bottom:20px;">

                <button type="submit">Опубликовать модель</button>
            </form>
        </div>
    </div>

    <script>
        const loginCard = document.getElementById('loginCard');
        const uploadCard = document.getElementById('uploadCard');
        const loginForm = document.getElementById('loginForm');
        const uploadForm = document.getElementById('uploadForm');

        let authToken = localStorage.getItem('pxs_token') || '';
        if (authToken) {
            loginCard.style.display = 'none';
            uploadCard.style.display = 'block';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === 'admin' && p === 'pxs_secret_2026') {
                authToken = 'Bearer pxs_secure_token_abc123';
                localStorage.setItem('pxs_token', authToken);
                loginCard.style.display = 'none';
                uploadCard.style.display = 'block';
            } else {
                alert('Неверный логин или пароль');
            }
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(uploadForm);
            
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                alert('Модель успешно загружена!');
                uploadForm.reset();
            } else {
                alert('Ошибка при загрузке');
            }
        });
    </script>
</body>
</html>
